<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>IMBIBE Taichung × 專屬優惠</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0a0a;
    color: #f0ead6;
    font-family: -apple-system, "PingFang TC", "Noto Sans TC", sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
  }

  .logo-line {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: #a08c5a;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  h1 {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: #f0ead6;
    margin-bottom: 4px;
  }

  .city {
    font-size: 13px;
    letter-spacing: 0.25em;
    color: #6b6050;
    text-transform: uppercase;
    margin-bottom: 48px;
  }

  .card {
    background: #141414;
    border: 1px solid #2a2418;
    border-radius: 20px;
    padding: 36px 28px;
    width: 100%;
    max-width: 360px;
    text-align: center;
    margin-bottom: 32px;
  }

  .offer-label {
    font-size: 11px;
    letter-spacing: 0.25em;
    color: #a08c5a;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .offer-main {
    font-size: 28px;
    font-weight: 700;
    color: #f0ead6;
    line-height: 1.3;
    margin-bottom: 12px;
  }

  .offer-sub {
    font-size: 14px;
    color: #6b6050;
    line-height: 1.7;
    margin-bottom: 28px;
  }

  .divider {
    height: 1px;
    background: #2a2418;
    margin: 24px 0;
  }

  .how-label {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: #6b6050;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .steps {
    text-align: left;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .step {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    font-size: 14px;
    color: #9a8e78;
    line-height: 1.5;
  }

  .step-num {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: #1e1a12;
    border: 1px solid #3a3020;
    color: #a08c5a;
    font-size: 11px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .cta-btn {
    display: block;
    width: 100%;
    max-width: 360px;
    padding: 18px;
    background: #a08c5a;
    color: #0a0a0a;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.08em;
    border: none;
    border-radius: 14px;
    text-decoration: none;
    text-align: center;
    cursor: pointer;
    transition: background 0.2s;
  }

  .cta-btn:active {
    background: #8a7848;
  }

  .note {
    font-size: 12px;
    color: #4a4438;
    margin-top: 20px;
    text-align: center;
    line-height: 1.6;
  }
</style>
</head>
<body>

  <p class="logo-line">Craft Cocktail Bar</p>
  <h1>IMBIBE</h1>
  <p class="city">Taichung</p>

  <div class="card">
    <p class="offer-label">本月專屬優惠</p>
    <p class="offer-main">今日消費<br>免服務費</p>
    <p class="offer-sub">持本頁面至櫃台出示<br>即可享有本次消費免收服務費</p>

    <div class="divider"></div>

    <p class="how-label">使用方式</p>
    <div class="steps">
      <div class="step">
        <div class="step-num">1</div>
        <span>入座後將此頁面出示給服務人員</span>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <span>結帳時服務人員將協助核銷</span>
      </div>
      <div class="step">
        <div class="step-num">3</div>
        <span>帳單免收服務費，直接結帳</span>
      </div>
    </div>
  </div>

  <a class="cta-btn" href="#" id="redeem-btn">出示此優惠券</a>

  <p class="note">此優惠由內容創作合作提供 · 每桌限用一次<br>不得與其他優惠併用</p>

<script>
  // 點按後顯示確認狀態
  document.getElementById('redeem-btn').addEventListener('click', function(e) {
    e.preventDefault();
    this.textContent = '✓ 已出示，請告知服務人員';
    this.style.background = '#2d5a27';
    this.style.color = '#a8d4a2';
    this.style.letterSpacing = '0.04em';
  });
</script>

</body>
</html>
