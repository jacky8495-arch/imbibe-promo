<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>IMBIBE ж ёйҠ·иЁҳйҢ„</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #f5f5f0;
    font-family: -apple-system, "PingFang TC", sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
  }
  .header { text-align: center; margin-bottom: 28px; }
  .header h1 { font-size: 20px; font-weight: 700; color: #1a1a1a; letter-spacing: 0.05em; }
  .header p { font-size: 13px; color: #999; margin-top: 4px; }

  .card {
    background: #fff;
    border-radius: 16px;
    padding: 28px 24px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    margin-bottom: 16px;
  }

  label { display: block; font-size: 12px; font-weight: 700; color: #888; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px; }

  input[type="number"] {
    width: 100%;
    padding: 14px 16px;
    font-size: 28px;
    font-weight: 700;
    border: 2px solid #e8e8e4;
    border-radius: 10px;
    color: #1a1a1a;
    background: #fafaf8;
    margin-bottom: 20px;
    outline: none;
    -webkit-appearance: none;
    appearance: none;
  }
  input[type="number"]:focus { border-color: #a08c5a; background: #fff; }

  .row { display: flex; gap: 12px; margin-bottom: 4px; }
  .row > div { flex: 1; }
  .row input[type="number"] { font-size: 20px; margin-bottom: 0; }

  .submit-btn {
    width: 100%;
    padding: 17px;
    background: #1a1a1a;
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    letter-spacing: 0.05em;
    margin-top: 20px;
  }
  .submit-btn:active { background: #333; }

  .hint {
    font-size: 12px;
    color: #bbb;
    text-align: center;
    margin-top: 10px;
    line-height: 1.5;
  }

  .records-card {
    background: #fff;
    border-radius: 16px;
    padding: 20px 24px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  .records-title { font-size: 11px; font-weight: 700; color: #aaa; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 14px; }
  .record-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0; border-bottom: 1px solid #f0f0ec; font-size: 14px;
  }
  .record-row:last-child { border-bottom: none; }
  .record-meta { font-size: 12px; color: #bbb; }
  .record-amt { font-weight: 700; color: #1a1a1a; }
  .total-row {
    display: flex; justify-content: space-between; padding-top: 14px;
    margin-top: 4px; border-top: 2px solid #1a1a1a; font-weight: 700; font-size: 15px;
  }
  #no-records { color: #ccc; font-size: 14px; text-align: center; padding: 16px 0; }
</style>
</head>
<body>

<div class="header">
  <h1>IMBIBE Г— ж ёйҠ·</h1>
  <p>йЎ§е®ўеҮәзӨәе„Әжғ жҷӮеЎ«еҜ«пјҢжҢүдёӢеҫҢиҮӘеӢ•й–Ӣе•ҹиЁҳйҢ„иЎЁ</p>
</div>

<div class="card">
  <label>ж¶ҲиІ»йҮ‘йЎҚпјҲеҗ«зЁ…пјҢе…ҚжңҚеӢҷиІ»еҫҢпјү</label>
  <input type="number" id="amount" placeholder="0" min="0" step="50" inputmode="numeric">

  <div class="row">
    <div>
      <label>жЎҢиҷҹ</label>
      <input type="number" id="table" placeholder="вҖ”" min="1" max="99" inputmode="numeric">
    </div>
    <div>
      <label>дәәж•ё</label>
      <input type="number" id="pax" placeholder="вҖ”" min="1" max="30" inputmode="numeric">
    </div>
  </div>

  <button class="submit-btn" onclick="submit()">вң“ ж ёйҠ·дёҰиЁҳйҢ„</button>
  <p class="hint">жҢүдёӢеҫҢжңғй–Ӣе•ҹ Google иЎЁе–®<br>зўәиӘҚиіҮж–ҷеҫҢйҖҒеҮәеҚіе®ҢжҲҗиЁҳйҢ„</p>
</div>

<div class="records-card">
  <div class="records-title">д»Ҡж—Ҙжң¬ж©ҹиЁҳйҢ„</div>
  <div id="records-list"><div id="no-records">е°ҡз„ЎиЁҳйҢ„</div></div>
  <div class="total-row" id="total-row" style="display:none">
    <span>д»Ҡж—ҘеҗҲиЁҲ</span>
    <span id="total-amt">$0</span>
  </div>
</div>

<script>
  var FORM_BASE = 'https://docs.google.com/forms/d/e/1FAIpQLSca5lBQbobOKAkMYb3Mq0njsDHwbsa8uZr8nynsRt57bEk_Vg/viewform';
  var ENTRY_AMOUNT = 'entry.1801055237';
  var ENTRY_TABLE  = 'entry.1687691748';

  var KEY = 'imbibe_' + new Date().toDateString();
  var records = JSON.parse(localStorage.getItem(KEY) || '[]');

  function submit() {
    var amount = parseInt(document.getElementById('amount').value);
    var table  = document.getElementById('table').value || '';
    var pax    = document.getElementById('pax').value || '';
    if (!amount || amount <= 0) { alert('и«Ӣијёе…Ҙж¶ҲиІ»йҮ‘йЎҚ'); return; }

    // еӯҳжң¬ж©ҹ
    records.unshift({ amount: amount, table: table, pax: pax, ts: Date.now() });
    localStorage.setItem(KEY, JSON.stringify(records));
    renderRecords();

    // жё…з©ә
    document.getElementById('amount').value = '';
    document.getElementById('table').value = '';
    document.getElementById('pax').value = '';

    // й–Ӣе•ҹй җеЎ« Google Form
    var label = table ? amount + 'пјҲжЎҢ' + table + (pax ? 'гғ»' + pax + 'дәә' : '') + 'пјү' : amount + '';
    var url = FORM_BASE + '?usp=pp_url'
            + '&' + ENTRY_AMOUNT + '=' + encodeURIComponent(amount)
            + '&' + ENTRY_TABLE  + '=' + encodeURIComponent(table ? 'жЎҢ' + table + (pax ? 'гғ»' + pax + 'дәә' : '') : '');
    window.open(url, '_blank');
  }

  function renderRecords() {
    var list = document.getElementById('records-list');
    var totalRow = document.getElementById('total-row');
    if (records.length === 0) {
      list.innerHTML = '<div id="no-records">е°ҡз„ЎиЁҳйҢ„</div>';
      totalRow.style.display = 'none';
      return;
    }
    var total = 0;
    list.innerHTML = records.map(function(r) {
      total += r.amount;
      var time = new Date(r.ts).toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'});
      var meta = time + (r.table ? ' В· жЎҢ' + r.table : '') + (r.pax ? ' В· ' + r.pax + 'дәә' : '');
      return '<div class="record-row"><span class="record-meta">' + meta + '</span><span class="record-amt">$' + r.amount.toLocaleString() + '</span></div>';
    }).join('');
    totalRow.style.display = 'flex';
    document.getElementById('total-amt').textContent = '$' + total.toLocaleString();
  }

  renderRecords();
</script>

</body>
</html>
