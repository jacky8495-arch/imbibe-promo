<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>IMBIBE 核銷記錄</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #f5f5f0;
    font-family: -apple-system, "PingFang TC", sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
  }
  .header { text-align: center; margin-bottom: 28px; }
  .header h1 { font-size: 20px; font-weight: 700; color: #1a1a1a; letter-spacing: 0.05em; }
  .header p { font-size: 13px; color: #999; margin-top: 4px; }

  .card {
    background: #fff;
    border-radius: 16px;
    padding: 28px 24px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    margin-bottom: 16px;
  }

  label { display: block; font-size: 12px; font-weight: 700; color: #888; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px; }

  input {
    width: 100%;
    padding: 14px 16px;
    font-size: 28px;
    font-weight: 700;
    border: 2px solid #e8e8e4;
    border-radius: 10px;
    color: #1a1a1a;
    background: #fafaf8;
    margin-bottom: 20px;
    outline: none;
    -webkit-appearance: none;
    appearance: none;
  }
  input#code { letter-spacing: 0.4em; text-align: center; }
  input:focus { border-color: #a08c5a; background: #fff; }

  .row { display: flex; gap: 12px; }
  .row > div { flex: 1; }
  .row input { font-size: 20px; margin-bottom: 0; }

  .submit-btn {
    width: 100%;
    padding: 17px;
    background: #1a1a1a;
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    letter-spacing: 0.05em;
    margin-top: 20px;
  }
  .submit-btn:active { background: #333; }
  .submit-btn:disabled { background: #ccc; cursor: not-allowed; }

  .feedback {
    padding: 14px 16px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    text-align: center;
    margin-top: 14px;
    display: none;
    line-height: 1.5;
  }
  .feedback.success { background: #f0faf0; color: #1a7a1a; border: 1px solid #b0e0b0; }
  .feedback.error   { background: #fff0f0; color: #a00000; border: 1px solid #f0b0b0; }

  .records-card {
    background: #fff;
    border-radius: 16px;
    padding: 20px 24px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  .records-title { font-size: 11px; font-weight: 700; color: #aaa; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 14px; }
  .record-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0; border-bottom: 1px solid #f0f0ec; font-size: 14px;
  }
  .record-row:last-child { border-bottom: none; }
  .record-meta { font-size: 12px; color: #bbb; }
  .record-amt { font-weight: 700; color: #1a1a1a; }
  .total-row {
    display: flex; justify-content: space-between; padding-top: 14px;
    margin-top: 4px; border-top: 2px solid #1a1a1a; font-weight: 700; font-size: 15px;
  }
  #no-records { color: #ccc; font-size: 14px; text-align: center; padding: 16px 0; }
</style>
</head>
<body>

<div class="header">
  <h1>IMBIBE × 核銷</h1>
  <p>確認顧客驗證碼後填入金額送出</p>
</div>

<div class="card">
  <label>顧客驗證碼</label>
  <input type="text" id="code" placeholder="0000" maxlength="4" inputmode="numeric" autocomplete="off">

  <label>消費金額（免服務費後）</label>
  <input type="number" id="amount" placeholder="0" min="0" step="50" inputmode="numeric">

  <div class="row">
    <div>
      <label>桌號</label>
      <input type="number" id="table" placeholder="—" min="1" max="99" inputmode="numeric">
    </div>
    <div>
      <label>人數</label>
      <input type="number" id="pax" placeholder="—" min="1" max="30" inputmode="numeric">
    </div>
  </div>

  <button class="submit-btn" id="btn" onclick="submitRedeem()">✓ 核銷並記錄</button>
  <div class="feedback" id="feedback"></div>
</div>

<div class="records-card">
  <div class="records-title">今日本機記錄</div>
  <div id="records-list"><div id="no-records">尚無記錄</div></div>
  <div class="total-row" id="total-row" style="display:none">
    <span>今日合計</span>
    <span id="total-amt">$0</span>
  </div>
</div>

<script>
  var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxatg4reCNnY_5udcKdkb1HmEYYu66YQdVMuilGuOTscJax1Z01GfXUgm3Z6_QZg7QSqA/exec';

  var KEY = 'imbibe_' + new Date().toDateString();
  var records = JSON.parse(localStorage.getItem(KEY) || '[]');
  renderRecords();

  function submitRedeem() {
    var code   = document.getElementById('code').value.trim();
    var amount = parseInt(document.getElementById('amount').value);
    var table  = document.getElementById('table').value || '';
    var pax    = document.getElementById('pax').value   || '';

    if (code.length !== 4) { showFeedback('error', '請輸入顧客的 4 位驗證碼'); return; }
    if (!amount || amount <= 0) { showFeedback('error', '請輸入消費金額'); return; }

    var btn = document.getElementById('btn');
    btn.disabled = true;
    btn.textContent = '驗證中…';

    var url = SCRIPT_URL
      + '?action=redeem'
      + '&code='   + encodeURIComponent(code)
      + '&amount=' + encodeURIComponent(amount)
      + '&table='  + encodeURIComponent(table)
      + '&pax='    + encodeURIComponent(pax);

    fetch(url)
      .then(function(res) { return res.json(); })
      .then(function(data) {
        btn.disabled = false;
        btn.textContent = '✓ 核銷並記錄';

        if (data.status === 'ok') {
          showFeedback('success', '核銷成功！\n' + data.name + ' · $' + parseInt(amount).toLocaleString());
          records.unshift({ code: code, amount: amount, table: table, pax: pax, name: data.name, ts: Date.now() });
          localStorage.setItem(KEY, JSON.stringify(records));
          renderRecords();
          document.getElementById('code').value   = '';
          document.getElementById('amount').value = '';
          document.getElementById('table').value  = '';
          document.getElementById('pax').value    = '';
        } else {
          showFeedback('error', '驗證碼無效或已使用\n請確認顧客頁面上的號碼');
        }
      })
      .catch(function() {
        btn.disabled = false;
        btn.textContent = '✓ 核銷並記錄';
        showFeedback('error', '網路錯誤，請重試');
      });
  }

  function showFeedback(type, msg) {
    var el = document.getElementById('feedback');
    el.className = 'feedback ' + type;
    el.style.whiteSpace = 'pre-line';
    el.textContent = msg;
    el.style.display = 'block';
    setTimeout(function() { el.style.display = 'none'; }, 5000);
  }

  function renderRecords() {
    var list     = document.getElementById('records-list');
    var totalRow = document.getElementById('total-row');
    if (records.length === 0) {
      list.innerHTML = '<div id="no-records">尚無記錄</div>';
      totalRow.style.display = 'none';
      return;
    }
    var total = 0;
    list.innerHTML = records.map(function(r) {
      total += r.amount;
      var time = new Date(r.ts).toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
      var meta = time
        + (r.name  ? ' · ' + r.name        : '')
        + (r.table ? ' · 桌' + r.table     : '')
        + (r.pax   ? ' · ' + r.pax + '人'  : '');
      return '<div class="record-row"><span class="record-meta">' + meta + '</span><span class="record-amt">$' + r.amount.toLocaleString() + '</span></div>';
    }).join('');
    totalRow.style.display = 'flex';
    document.getElementById('total-amt').textContent = '$' + total.toLocaleString();
  }
</script>

</body>
</html>
