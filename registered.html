<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>IMBIBE × 優惠綁定</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0a;
    color: #f0ead6;
    font-family: -apple-system, "PingFang TC", sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    text-align: center;
  }
  .brand { font-size: 11px; letter-spacing: 0.3em; color: #a08c5a; text-transform: uppercase; margin-bottom: 6px; }
  h1 { font-size: 28px; font-weight: 700; letter-spacing: 0.08em; margin-bottom: 32px; }
  .check-icon {
    width: 72px; height: 72px;
    background: #1a3a1a;
    border: 2px solid #22c55e;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
    margin: 0 auto 24px;
  }
  .title { font-size: 20px; font-weight: 700; margin-bottom: 12px; }
  .sub { font-size: 14px; color: #6b6050; line-height: 1.8; margin-bottom: 32px; }
  .line-hint {
    background: #111;
    border: 1px solid #2a2418;
    border-radius: 16px;
    padding: 20px 24px;
    max-width: 320px;
    width: 100%;
  }
  .line-hint-label { font-size: 11px; color: #6b6050; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; }
  .line-hint-text { font-size: 14px; color: #9a8e78; line-height: 1.7; }
</style>
</head>
<body>
  <p class="brand">Craft Cocktail Bar</p>
  <h1>IMBIBE</h1>
  <div class="check-icon">✓</div>
  <p class="title">優惠已綁定！</p>
  <p class="sub">請查看你的 LINE 訊息<br>優惠說明已傳送到你的 LINE</p>
  <div class="line-hint">
    <p class="line-hint-label">使用方式</p>
    <p class="line-hint-text">來店消費後，掃描桌上的 QR code 即可啟用當次免服務費優惠</p>
  </div>
</body>
</html>
