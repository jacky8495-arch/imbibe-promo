<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>IMBIBE × LINE 優惠</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0a;
    color: #f0ead6;
    font-family: -apple-system, "PingFang TC", sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    text-align: center;
  }
  .brand { font-size: 11px; letter-spacing: 0.3em; color: #a08c5a; text-transform: uppercase; margin-bottom: 8px; }
  h1 { font-size: 30px; font-weight: 700; letter-spacing: 0.08em; margin-bottom: 40px; }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid #2a2418;
    border-top-color: #a08c5a;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 20px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .msg { font-size: 15px; color: #6b6050; line-height: 1.6; }
</style>
</head>
<body>
  <p class="brand">Craft Cocktail Bar</p>
  <h1>IMBIBE</h1>
  <div class="spinner" id="spinner"></div>
  <p class="msg" id="msg">正在驗證 LINE 身份…</p>

<script>
  var LIFF_ID  = '2009912149-izRiSylm';       // LIFF ID
  var API_URL  = 'https://script.google.com/macros/s/AKfycbxatg4reCNnY_5udcKdkb1HmEYYu66YQdVMuilGuOTscJax1Z01GfXUgm3Z6_QZg7QSqA/exec';

  var source = new URLSearchParams(location.search).get('source') || 'direct';

  liff.init({ liffId: LIFF_ID })
    .then(function() {
      if (!liff.isLoggedIn()) {
        liff.login({ redirectUri: location.href });
        return;
      }
      return liff.getProfile();
    })
    .then(function(profile) {
      if (!profile) return;
      document.getElementById('msg').textContent = '取得身份成功，驗證中…';
      var uid  = profile.userId;
      var name = profile.displayName;
      var url  = API_URL + '?uid=' + encodeURIComponent(uid) + '&name=' + encodeURIComponent(name) + '&source=' + encodeURIComponent(source);
      return fetch(url);
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (data.status === 'ok') {
        location.href = 'verified.html?code=' + data.code + '&name=' + encodeURIComponent(data.name);
      } else {
        location.href = 'used.html?days=' + data.daysRemaining;
      }
    })
    .catch(function(err) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('msg').textContent = '發生錯誤，請重新掃描 QR code。';
    });
</script>
</body>
</html>
